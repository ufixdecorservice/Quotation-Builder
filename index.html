<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFIX - Quotation Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="./style.css">
    <!-- HTML2PDF library for PDF download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="app-container">
    
    <!-- Sidebar Toggle Button (Always visible) -->
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <!-- ==========================================================================
         SIDEBAR: Control Panel & Form Inputs (Left Pane)
         ========================================================================== -->
    <aside class="control-sidebar" id="control-sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-file-invoice-dollar"></i> Quotation Builder</h1>
        </div>
        
        <div class="sidebar-content">
            
            <!-- Theme Color Selector & Document Copy Mode -->
            <div class="sidebar-section">
                <h3><i class="fas fa-sliders-h"></i> การตั้งค่าเอกสาร</h3>
                <div class="form-group">
                    <label>เลือกสีธีมเอกสาร</label>
                    <div class="theme-picker">
                        <button class="theme-btn theme-purple" data-theme="purple" title="ธีมม่วง PEAK"></button>
                        <button class="theme-btn theme-orange" data-theme="orange" title="ธีมส้ม UFIX"></button>
                        <button class="theme-btn theme-blue" data-theme="blue" title="ธีมน้ำเงิน Corporate"></button>
                        <button class="theme-btn theme-green" data-theme="green" title="ธีมเขียว Emerald"></button>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>รูปแบบการพิมพ์เอกสาร</label>
                    <select id="inp-doc-copy-mode" class="form-control">
                        <option value="both">ออกเป็นชุด (ต้นฉบับ + สำเนา)</option>
                        <option value="original">เฉพาะใบต้นฉบับ (Original Only)</option>
                        <option value="copy">เฉพาะใบสำเนา (Copy Only)</option>
                    </select>
                </div>
            </div>

            <!-- Document Meta Details -->
            <div class="sidebar-section">
                <h3><i class="fas fa-info-circle"></i> ข้อมูลเอกสาร</h3>
                <div class="form-group">
                    <label>เลขที่เอกสาร</label>
                    <input type="text" id="inp-doc-no" class="form-control">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>วันที่ออก</label>
                        <input type="date" id="inp-date-created" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>ใช้ได้ถึง</label>
                        <input type="date" id="inp-date-expired" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>วันที่ตอบรับ (ระบุถ้ามี)</label>
                    <input type="text" id="inp-date-accepted" class="form-control">
                </div>
            </div>

            <!-- Seller Info (UFIX) -->
            <div class="sidebar-section">
                <h3><i class="fas fa-store"></i> ข้อมูลผู้ขาย (บริษัท)</h3>
                <div class="form-group">
                    <label>ชื่อผู้ขาย / บริษัท</label>
                    <input type="text" id="inp-seller-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>เลขประจำตัวผู้เสียภาษี</label>
                    <input type="text" id="inp-seller-tax" class="form-control">
                </div>
                <div class="form-group">
                    <label>ที่อยู่ผู้ขาย</label>
                    <textarea id="inp-seller-address" class="form-control" rows="3"></textarea>
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="text" id="inp-seller-phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>อีเมลติดต่อ</label>
                        <input type="email" id="inp-seller-email" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Customer Info -->
            <div class="sidebar-section">
                <h3><i class="fas fa-user-tie"></i> ข้อมูลลูกค้า</h3>
                <div class="form-group">
                    <label>ชื่อลูกค้า / โครงการ</label>
                    <input type="text" id="inp-customer-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>เลขประจำตัวผู้เสียภาษี (ระบุถ้ามี)</label>
                    <input type="text" id="inp-customer-tax" class="form-control">
                </div>
                <div class="form-group">
                    <label>ที่อยู่ลูกค้า</label>
                    <textarea id="inp-customer-address" class="form-control" rows="3"></textarea>
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="text" id="inp-customer-phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>อีเมลลูกค้า</label>
                        <input type="text" id="inp-customer-email" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Seller Contact Person -->
            <div class="sidebar-section">
                <h3><i class="fas fa-address-book"></i> ผู้ติดต่อประสานงาน (ผู้ขาย)</h3>
                <div class="form-group">
                    <label>ชื่อผู้ประสานงาน</label>
                    <input type="text" id="inp-contact-person" class="form-control">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>เบอร์โทร</label>
                        <input type="text" id="inp-contact-phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>อีเมล</label>
                        <input type="email" id="inp-contact-email" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Item List Manager -->
            <div class="sidebar-section">
                <h3><i class="fas fa-th-list"></i> รายการสินค้า/บริการ</h3>
                <div id="sidebar-items-list">
                    <!-- Items will be dynamically rendered here -->
                </div>
                <button id="btn-add-item-sidebar" class="btn btn-secondary" style="margin-top: 10px;">
                    <i class="fas fa-plus"></i> เพิ่มรายการสินค้า/บริการ
                </button>
            </div>

            <!-- Calculation Settings -->
            <div class="sidebar-section">
                <h3><i class="fas fa-calculator"></i> การคำนวณภาษี</h3>
                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="inp-include-vat" style="width: 16px; height: 16px;">
                    <label for="inp-include-vat" style="margin-bottom: 0;">คิดภาษีมูลค่าเพิ่ม (VAT 7%)</label>
                </div>
                <div class="form-group">
                    <label>หัก ณ ที่จ่าย (WHT)</label>
                    <select id="inp-wht-rate" class="form-control">
                        <option value="0">ไม่หัก ณ ที่จ่าย</option>
                        <option value="1">หัก ณ ที่จ่าย 1% (ค่าขนส่ง/บริการบางประเภท)</option>
                        <option value="3">หัก ณ ที่จ่าย 3% (ค่าบริการ/รับจ้างทำของ)</option>
                    </select>
                </div>
            </div>

            <!-- Bank Details -->
            <div class="sidebar-section">
                <h3><i class="fas fa-university"></i> ช่องทางการรับชำระเงิน</h3>
                <div class="form-group">
                    <label>ชื่อธนาคาร</label>
                    <input type="text" id="inp-bank-name" class="form-control">
                </div>
                <div class="row-2">
                    <div class="form-group">
                        <label>เลขที่บัญชี</label>
                        <input type="text" id="inp-bank-acc-no" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>ประเภทบัญชี</label>
                        <input type="text" id="inp-bank-branch" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>ชื่อบัญชี</label>
                    <input type="text" id="inp-bank-acc-name" class="form-control">
                </div>
            </div>

            <!-- Remark -->
            <div class="sidebar-section">
                <h3><i class="fas fa-comment-dots"></i> หมายเหตุเอกสาร</h3>
                <div class="form-group">
                    <textarea id="inp-remark" class="form-control" rows="3" placeholder="ระบุเงื่อนไขการรับประกัน การส่งมอบ ฯลฯ"></textarea>
                </div>
            </div>

            <!-- Signatures Names -->
            <div class="sidebar-section">
                <h3><i class="fas fa-pen-nib"></i> รายละเอียดการลงนาม</h3>
                <div class="form-group">
                    <label>ชื่อผู้ออกเอกสาร</label>
                    <input type="text" id="inp-sig-creator-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>วันที่ออกเอกสาร</label>
                    <input type="text" id="inp-sig-creator-date" class="form-control" placeholder="เช่น 15/06/2026">
                </div>
                <div class="form-group">
                    <label>ชื่อผู้อนุมัติเอกสาร</label>
                    <input type="text" id="inp-sig-approver-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>วันที่อนุมัติเอกสาร</label>
                    <input type="text" id="inp-sig-approver-date" class="form-control" placeholder="เช่น 15/06/2026">
                </div>
                <div class="form-group">
                    <label>ชื่อลูกค้าผู้รับเอกสาร</label>
                    <input type="text" id="inp-sig-customer-name" class="form-control">
                </div>
                <div class="form-group">
                    <label>วันที่ตอบรับลูกค้า</label>
                    <input type="text" id="inp-sig-customer-date" class="form-control">
                </div>
            </div>

        </div>
        
        <!-- Sidebar Actions Footer -->
        <div class="sidebar-footer">
            <button id="btn-download-pdf" class="btn btn-primary"><i class="fas fa-file-pdf"></i> ดาวน์โหลด PDF</button>
            <button id="btn-print" class="btn btn-secondary"><i class="fas fa-print"></i> พิมพ์เอกสาร</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button id="btn-save-draft" class="btn btn-secondary" style="font-size:0.8rem;"><i class="fas fa-save"></i> บันทึกร่าง</button>
                <button id="btn-load-sample" class="btn btn-secondary" style="font-size:0.8rem;"><i class="fas fa-sync-alt"></i> โหลดตัวอย่าง</button>
            </div>
            <button id="btn-reset" class="btn btn-danger"><i class="fas fa-undo"></i> ล้างข้อมูลฟอร์ม</button>
        </div>
    </aside>

    <!-- ==========================================================================
         WORKSPACE: Live A4 PDF Preview Container (Right Pane)
         ========================================================================== -->
    <main class="preview-workspace">
        
        <div id="print-area">
            <!-- Pages will be dynamically generated here by app.js -->
            <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top: 10px;">กำลังเตรียมตัวอย่างเอกสาร...</p>
            </div>
        </div>

    </main>

</div>

<!-- Mobile Bottom Navigation Bar -->
<div class="mobile-bottom-nav">
    <button id="btn-mobile-edit" class="mobile-nav-btn active" onclick="switchMobileTab('edit')">
        <i class="fas fa-edit"></i>
        <span>กรอกข้อมูล</span>
    </button>
    <button id="btn-mobile-preview" class="mobile-nav-btn" onclick="switchMobileTab('preview')">
        <i class="fas fa-file-invoice-dollar"></i>
        <span>ดูใบเสนอราคา</span>
    </button>
</div>

<script>
    // Inline script to handle mobile tab switching
    function switchMobileTab(mode) {
        const body = document.body;
        const btnEdit = document.getElementById('btn-mobile-edit');
        const btnPreview = document.getElementById('btn-mobile-preview');
        
        if (mode === 'edit') {
            body.classList.remove('mobile-preview-active');
            body.classList.add('mobile-edit-active');
            if (btnEdit) btnEdit.classList.add('active');
            if (btnPreview) btnPreview.classList.remove('active');
        } else {
            body.classList.remove('mobile-edit-active');
            body.classList.add('mobile-preview-active');
            if (btnEdit) btnEdit.classList.remove('active');
            if (btnPreview) btnPreview.classList.add('active');
            
            // Re-calculate scale when switching to preview tab
            adjustMobileScale();
        }
    }

    // Function to calculate exact scaling for mobile screen dynamically
    function adjustMobileScale() {
        if (window.innerWidth <= 768) {
            const targetWidth = window.innerWidth - 20; // 10px padding on each side
            const scale = targetWidth / 794; // 794px = 210mm (A4 width)
            document.documentElement.style.setProperty('--preview-scale', scale);
        } else {
            document.documentElement.style.setProperty('--preview-scale', '1');
        }
    }

    // Adjust scale on load and resize
    window.addEventListener('resize', adjustMobileScale);
    document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('mobile-edit-active');
        adjustMobileScale();
    });
</script>

<!-- Persistence Layer Scripts (Google Sheets) -->
<script src="./auth.js"></script>
<script src="./gsheet.js"></script>
<script src="./history.js"></script>

<!-- Main Logic script -->
<script src="./app.js"></script>
</body>
</html>
